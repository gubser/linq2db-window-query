services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-201:
    build:
      context: LinqToDbQueryTests
      dockerfile: Dockerfile.201
    depends_on:
      postgres:
        condition: service_healthy

  test-103:
    build:
      context: LinqToDbQueryTests
      dockerfile: Dockerfile.103
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: